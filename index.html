    <style>
        :root {
            --p: #38bdf8;
            --a: #fbbf24;
            --bg: #020617;
            --card: rgba(255,255,255,0.05);
            --r: #ef4444;
            --g: #10b981;
            --w: #f8fafc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html[dir="ltr"] { direction: ltr; text-align: left; }
        html[dir="rtl"] { direction: rtl; text-align: right; }
        
        body {
            font-family: 'Cairo', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--w);
            line-height: 1.6;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        .w { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Language Switcher */
        .lang-switch {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 99;
            background: rgba(2,6,23,0.9);
            border: 1px solid var(--p);
            border-radius: 12px;
            padding: 5px;
            backdrop-filter: blur(10px);
        }
        
        .lang-switch button {
            background: transparent;
            border: none;
            color: var(--w);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .lang-switch button:hover,
        .lang-switch button.active {
            background: var(--p);
            color: #000;
        }
        
        /* الهيدر المحسّن */
        header {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(2,6,23,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--p);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .logo:hover { color: var(--a); transform: scale(1.02); }
        
        .contact-btn {
            color: var(--p);
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--p);
            padding: 8px 20px;
            border-radius: 25px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .contact-btn:hover {
            background: var(--p);
            color: #000;
        }

        /* Legal Notice Bar (AdSense Required) */
        .legal-bar {
            background: linear-gradient(90deg, rgba(239,68,68,0.1), rgba(56,189,248,0.1));
            border: 1px solid var(--p);
            color: var(--w);
            padding: 12px;
            text-align: center;
            font-size: 0.85rem;
            border-radius: 0 0 16px 16px;
            margin: 0 auto;
            max-width: 95%;
        }
        
        .legal-bar a {
            color: var(--p);
            text-decoration: underline;
            margin: 0 8px;
            font-weight: 600;
        }
        
        .legal-bar i {
            color: var(--r);
            margin: 0 5px;
        }

        /* شريط الأخبار المتحرك المحسّن */
        .ticker {
            background: linear-gradient(90deg, rgba(56,189,248,0.1), rgba(251,191,36,0.1));
            color: var(--p);
            padding: 12px 0;
            font-size: 0.9rem;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid rgba(56,189,248,0.2);
        }
        
        .ticker-content {
            display: inline-block;
            animation: ticker 35s linear infinite;
            font-weight: 600;
        }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* شبكة المقالات المحسّنة */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 50px 0;
        }
        
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--p), var(--a));
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        
        .card:hover {
            border-color: var(--p);
            transform: translateY(-12px) scale(1.02);
            background: rgba(56,189,248,0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .card:hover::before {
            transform: scaleX(1);
        }
        
        .card i {
            font-size: 2.8rem;
            color: var(--p);
            margin-bottom: 20px;
            display: block;
            transition: transform 0.3s;
        }
        
        .card:hover i {
            transform: scale(1.15);
        }
        
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            font-weight: 800;
        }
        
        .card p {
            font-size: 0.95rem;
            opacity: 0.85;
            line-height: 1.7;
        }
