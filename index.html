<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ProScholarTools - منصة ذكاء اصطناعي شاملة للأكاديميين والقانونيين.">
    <title>برو سكولر تولز | ProScholarTools</title>
    <link rel="icon" type="image/webp" href="/img/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: white; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* تنسيق اللوجو الاحترافي */
        header { text-align: center; padding: 50px 20px; }
        .logo-container { display: inline-block; margin-bottom: 20px; transition: transform 0.3s; }
        .site-logo {
            width: 280px; height: auto; display: block;
            image-rendering: -webkit-optimize-contrast; /* لمنع التشويش */
        }
        .logo-container:hover { transform: scale(1.05); }

        h1 { font-size: 2.5rem; color: var(--primary); margin: 0; }
        .tagline { font-size: 1.1rem; opacity: 0.8; margin-top: 10px; }

        /* الشبكة والأدوات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        button { 
            background: var(--primary); color: #0f172a; border: none; padding: 12px 25px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; 
        }

        @media (max-width: 768px) { .site-logo { width: 190px; } h1 { font-size: 2rem; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <a href="/">
                <img src="/img/logo.webp" alt="ProScholarTools Logo" class="site-logo">
            </a>
        </div>
        <h1>برو سكولر تولز</h1>
        <p class="tagline">حلول الذكاء الاصطناعي للبحث العلمي والتحليل القانوني</p>
    </header>

    <main class="grid">
        <div class="card">
            <img src="/img/viral-tiktok-scripts-social-media-roi.jpg" alt="TikTok Scripts">
            <h3>Viral TikTok Scripts</h3>
            <p>محتوى إبداعي يتصدر نتائج البحث.</p>
            <button onclick="alert('قريباً...')">ابدأ الآن</button>
        </div>
        <div class="card">
            <img src="/img/academic-integrity-plagiarism-checker.jpg" alt="Plagiarism Checker">
            <h3>Plagiarism Checker</h3>
            <p>فحص دقيق للأصالة العلمية.</p>
            <button onclick="alert('قريباً...')">فحص الملف</button>
        </div>
        <div class="card">
            <img src="/img/legal-document-analysis-ai.jpg" alt="Legal Assistant">
            <h3>Legal Assistant</h3>
            <p>تحليل المستندات القانونية بذكاء.</p>
            <button onclick="alert('قريباً...')">ابدأ التحليل</button>
        </div>
    </main>
</div>

</body>
</html>
