<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ProScholarTools - منصة ذكاء اصطناعي متطورة للأكاديميين والقانونيين.">
    <title>برو سكولر تولز | ProScholarTools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" media="print" onload="this.media='all'">
    
    <link rel="icon" type="image/webp" href="/img/logo.webp">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        
        /* منع قفز النصوص قبل تحميل الخط */
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); 
            color: white; line-height: 1.6; overflow-x: hidden; font-display: swap; 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* 2. إصلاح الـ CLS للهيدر */
        header { 
            text-align: center; padding: 40px 20px; 
            min-height: 200px; /* حجز مساحة الهيدر */
        }

        .logo-container {
            display: inline-block;
            width: 250px;
            height: 90px; /* حجز مساحة اللوجو */
            margin-bottom: 20px;
        }

        .site-logo {
            width: 250px; height: 90px; display: block;
            image-rendering: -webkit-optimize-contrast;
            aspect-ratio: 250 / 90;
        }

        h1 { font-size: 2.5rem; color: var(--primary); margin: 0; }

        /* 3. إصلاح الـ CLS للكروت (حجز مساحة الصور المحذوفة) */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 40px; 
        }

        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            backdrop-filter: blur(10px);
        }

        .card-img-placeholder {
            width: 100%;
            aspect-ratio: 3 / 2; /* حجز مساحة الصورة لمنع القفز */
            background: #1e293b;
            border-radius: 10px;
            margin-bottom: 15px;
            display: block;
            object-fit: cover;
        }

        button { 
            background: var(--primary); color: #0f172a; border: none; 
            padding: 12px 25px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; width: 100%; font-family: 'Cairo';
        }

        footer { 
            margin-top: 80px; padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
        }
        
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; }

        @media (max-width: 768px) {
            .site-logo { width: 180px; height: auto; }
            header { min-height: 150px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <a href="/" aria-label="ProScholarTools Home">
                <img src="/img/logo.webp" alt="ProScholarTools Logo" class="site-logo" fetchpriority="high">
            </a>
        </div>
        <h1>برو سكولر تولز</h1>
        <p style="opacity: 0.8;">حلول الذكاء الاصطناعي للباحثين والقانونيين</p>
    </header>

    <main class="grid">
        <div class="card">
            <img src="/img/tiktok.webp" alt="TikTok Scripts" class="card-img-placeholder" loading="lazy">
            <h3>Viral TikTok Scripts</h3>
            <button onclick="alert('جاري التجهيز...')">ابدأ الآن</button>
        </div>

        <div class="card">
            <img src="/img/plagiarism.webp" alt="Plagiarism Checker" class="card-img-placeholder" loading="lazy">
            <h3>Plagiarism Checker</h3>
            <button onclick="alert('قريباً...')">فحص الملف</button>
        </div>

        <div class="card">
            <img src="/img/legal.webp" alt="Legal Assistant" class="card-img-placeholder" loading="lazy">
            <h3>Legal Assistant</h3>
            <button onclick="alert('قريباً...')">ابدأ الآن</button>
        </div>
    </main>

    <footer>
        <a href="/">الرئيسية</a>
        <a href="privacy.html">سياسة الخصوصية</a>
        <p style="opacity: 0.5; margin-top: 15px;">© 2026 ProScholarTools</p>
    </footer>
</div>

</body>
</html>
